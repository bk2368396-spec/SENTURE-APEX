<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add new product to SENTEUR APEX inventory">
  <title>SENTEUR APEX | Add Product</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body id="addProductPage">
  <main class="admin-main" style="max-width: 960px; margin: 2rem auto; padding: 0 1rem;">
    <header class="admin-header" style="flex-wrap: wrap; gap: 1rem;">
      <div>
        <h1>Add New Product</h1>
        <p class="admin-subtitle">Save a perfume directly to Firebase so it appears on the website.</p>
      </div>
      <div class="admin-header-actions">
        <a href="admin.html" class="btn-secondary">Back to Dashboard</a>
      </div>
    </header>

    <div class="product-form-card" style="padding: 2rem;">
      <form id="productForm" class="admin-form" onsubmit="saveProduct(event)">
        <label for="productName">Product Name</label>
        <input id="productName" required>

        <label for="productPrice">Price (€)</label>
        <input id="productPrice" type="number" min="0" required>

        <label for="productStock">Stock Quantity</label>
        <input id="productStock" type="number" min="0" value="10" required>

        <label for="productGender">Category</label>
        <select id="productGender" required>
          <option value="male">Men</option>
          <option value="female">Women</option>
          <option value="unisex">Unisex</option>
          <option value="kids">Kids</option>
        </select>

        <label for="productImageUrl">Image URL</label>
        <input id="productImageUrl" placeholder="https://example.com/image.jpg">

        <label for="productNotes">Notes (optional)</label>
        <input id="productNotes" placeholder="Amber, Floral, Musk">

        <label for="productDescription">Description (optional)</label>
        <textarea id="productDescription" rows="4" placeholder="Short product description"></textarea>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Add Product</button>
          <button type="button" class="btn-secondary" onclick="resetProductForm()">Reset</button>
        </div>
        <div class="form-error" id="productFormError"></div>
        <div class="form-success" id="productSuccessMessage"></div>
      </form>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
