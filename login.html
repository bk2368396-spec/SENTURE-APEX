<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="index.html" class="navbar-logo">SENTEUR APEX</a>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle navigation">☰</button>
      <div class="navbar-links" id="navbarLinks">

  <main class="auth-page">
    <div class="auth-card">
      <h1>Customer Login</h1>
      <p>Access your account to leave reviews and manage your COD orders.</p>
      <form id="loginForm" class="auth-form" onsubmit="handleUserLogin(event)">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
        <button class="btn-gold" type="submit">Login</button>
        <p class="auth-footer">New to SENTEUR APEX? <a href="signup.html">Create account</a></p>
        <div class="form-error" id="authError"></div>
      </form>
    </div>
  </main>

  <a href="https://wa.me/923000000000?text=Hello%20SENTEUR%20APEX%20Admin" class="whatsapp-float" target="_blank" rel="noopener">
    <span>Chat Admin</span>
  </a>

</body>
